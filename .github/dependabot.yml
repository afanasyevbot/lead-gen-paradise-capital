version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      types:
        patterns: ["@types/*"]
      dev-minor-and-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      prod-minor-and-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
